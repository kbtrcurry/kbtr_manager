  }
};

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function today(){return new Date().toISOString().slice(0,10);}
function curYM(){return new Date().toISOString().slice(0,7);}

// date utils
function daysLeft(d){const t=new Date();t.setHours(0,0,0,0);const e=new Date(d);e.setHours(0,0,0,0);return Math.floor((e-t)/86400000);}
function isExpD(d){return daysLeft(d)<0;}
function isWarnD(d){const n=daysLeft(d);return n>=0&&n<=3;}

// ingredient utils
function up(i){return i.purchaseAmount?(i.purchasePrice/i.purchaseAmount)*1.08:0;}
function isLow(i){return i.initialStock>0&&(i.currentStock/i.initialStock)<0.2;}
function isExpI(i){return i.expiryDate&&isExpD(i.expiryDate);}
function isWarnI(i){return i.expiryDate&&isWarnD(i.expiryDate);}
function processExp(){let c=false;DB.ingredients=DB.ingredients.map(i=>{if(isExpI(i)&&i.currentStock>0){c=true;return{...i,currentStock:0};}return i;});if(c)save();}

// recipe utils
function potCost(r){return r.ingredients.reduce((s,ri)=>{const i=DB.ingredients.find(x=>x.id===ri.ingredientId);return s+(i?up(i)*ri.amountPerPot:0);},0);}
function srvCost(r){return r.servingsPerPot?potCost(r)/r.servingsPerPot:0;}

// sales utils
function rent(r){return r.rentType==='fixed'?r.rentAmount:r.totalSales*(r.rentAmount/100);}
function netP(r){
  const entries=r.recipeEntries||(r.recipeIds||[]).map(id=>({id,servings:r.servingsSold||0}));
  const cost=entries.reduce((s,e)=>{const rec=DB.recipes.find(x=>x.id===e.id);return s+(rec?srvCost(rec)*Number(e.servings||0):0);},0);
  return r.totalSales-cost-rent(r)-r.otherExpenses;
}
function mSummary(ym){
  const rs=DB.sales.filter(r=>r.date.startsWith(ym));
  let ts=0,tc=0,tr=0,to=0,sv=0;
  rs.forEach(r=>{ts+=r.totalSales;sv+=r.servingsSold;const entries=r.recipeEntries||(r.recipeIds||[]).map(id=>({id,servings:r.servingsSold||0}));const cost=entries.reduce((s,e)=>{const rec=DB.recipes.find(x=>x.id===e.id);return s+(rec?srvCost(rec)*Number(e.servings||0):0);},0);tc+=cost;tr+=rent(r);to+=r.otherExpenses;});
  return{ts,tc,tr,to,net:ts-tc-tr-to,cr:ts>0?(tc/ts)*100:0,sv,n:rs.length};
}

function applyReceiptPrices(jsonStr){
  const items = JSON.parse(jsonStr);
  let updated = 0;
  items.forEach((item, idx) => {
    const cb = document.getElementById(`ri-${idx}`);
    if(!cb || !cb.checked) return;
    if(!item.matchedName) return;
    const ing = DB.ingredients.find(i => i.name === item.matchedName);
    if(!ing) return;

    const priceEl = document.getElementById(`rp-${idx}`);
    const amountEl = document.getElementById(`ra-${idx}`);
    const price = Number(priceEl?.value) || item.price;
    const amount = item.amount || Number(amountEl?.value) || ing.purchaseAmount;

    if(price > 0){
      ing.purchasePrice = price;
      if(amount > 0) ing.purchaseAmount = amount;

  if(updated === 0){ toast('æ´æ°ããé ç®ãããã¾ãã','w'); return; }
