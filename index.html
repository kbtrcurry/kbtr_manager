<script type="module">
import{initializeApp,getApps}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import{getDatabase,ref,set,onValue,get}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';
window._fbInit=async function(cfg){
  try{
    const existing=getApps().find(a=>a.name===cfg.projectId);
    const app=existing||initializeApp(cfg,cfg.projectId);
    const db=getDatabase(app);
    window._fbDb=db;
    window._fbRef=ref(db,'kobataro/data');
    // 保存関数をここで確定（import不要）
    window._fbSave=async function(){
      if(!window._fbRef)return;
      try{
        window._lastSaveTs=Date.now();
        await set(window._fbRef,{...DB,_ts:window._lastSaveTs});
      }catch(e){console.error('FB save error:',e);}
    };
    const snap=await get(window._fbRef);
    if(snap.exists()){
      const remote=snap.val();
      const remoteTs=remote._ts||0;
      const localTs=window._localTs||0;
      if(remoteTs>=localTs){
        // Firebaseのデータが新しい or 同じ → Firebaseを使う
        const d=Object.assign({ingredients:[],recipes:[],sales:[]},remote);
        delete d._ts;
        DB=d;window.DB=DB;
        try{localStorage.setItem('kobataro_v4',JSON.stringify(DB));}catch(e){}
        window._appProcessExp();
        window._appRender(window._curTab||'dashboard');
        window._appBadge();
      } else {
        // ローカルの方が新しい → ローカルをFirebaseにアップ
        await window._fbSave();
      }
    } else {
      // Firebaseが空 → ローカルをアップロード
      await window._fbSave();
    }
    if(window._fbUnsub)window._fbUnsub();
    window._fbUnsub=onValue(window._fbRef,s=>{
      if(!s.exists())return;
      const d=s.val();
      // 自分が書き込んだ更新は無視
      if(d._ts&&window._lastSaveTs&&d._ts<=window._lastSaveTs)return;
      const nd=Object.assign({ingredients:[],recipes:[],sales:[]},d);
      delete nd._ts;
      DB=nd;window.DB=DB;
      try{localStorage.setItem('kobataro_v4',JSON.stringify(DB));}catch(e){}
      window._appProcessExp();
      window._appRender(window._curTab||'dashboard');
      window._appBadge();
    });
    localStorage.setItem('fb_cfg',JSON.stringify(cfg));
    window._fbConnected=true;
    return true;
  }catch(e){
    console.error('Firebase init error:',e);
    return false;
  }
};
const _defaultCfg={apiKey:'AIzaSyCwWx7ZOe_nE2azPSG33Rw6hT06P8cPghI',projectId:'kbtrmanager',appId:'1:577748339691:web:ac50fc038ebfe674f2e7ae',databaseURL:'https://kbtrmanager-default-rtdb.firebaseio.com',authDomain:'kbtrmanager.firebaseapp.com',storageBucket:'kbtrmanager.appspot.com',messagingSenderId:''};
const saved=localStorage.getItem('fb_cfg');
if(saved){try{window._fbInit(JSON.parse(saved));}catch(e){window._fbInit(_defaultCfg);}}
else{window._fbInit(_defaultCfg);}
</script>

<script>
// ─── DATA ───────────────────────────────────────────────────
const SK='kobataro_v4';
let DB={ingredients:[],recipes:[],sales:[]};
window.DB=DB;
window._curTab='dashboard';
window._localTs=0;
// グローバル公開（Firebaseコールバック用）- 直接参照で無限ループ防止
window._appRender=function(t){render(t);};
window._appBadge=function(){badge();};
window._appProcessExp=function(){
  let c=false;
  DB.ingredients=DB.ingredients.map(i=>{
    if(i.expiryDate&&new Date(i.expiryDate)<new Date()&&i.currentStock>0){c=true;return{...i,currentStock:0};}
    return i;
  });
  window.DB=DB;
  if(c){try{localStorage.setItem('kobataro_v4',JSON.stringify(DB));}catch(e){}}
};

function load(){
  try{const r=localStorage.getItem(SK);if(r){DB=Object.assign({ingredients:[],recipes:[],sales:[]},JSON.parse(r));window.DB=DB;window._localTs=Date.now();}}catch(e){}
  processExp();
}
function save(){
  window.DB=DB;
  try{localStorage.setItem(SK,JSON.stringify(DB));}catch(e){}
  window._localTs=Date.now();
  if(window._fbSave)window._fbSave();
}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function today(){return new Date().toISOString().slice(0,10);}
function curYM(){return new Date().toISOString().slice(0,7);}

// date utils
function daysLeft(d){const t=new Date();t.setHours(0,0,0,0);const e=new Date(d);e.setHours(0,0,0,0);return Math.floor((e-t)/86400000);}
function isExpD(d){return daysLeft(d)<0;}
function isWarnD(d){const n=daysLeft(d);return n>=0&&n<=3;}

// ingredient utils
function up(i){return i.purchaseAmount?(i.purchasePrice/i.purchaseAmount)*1.08:0;}
function isLow(i){return i.initialStock>0&&(i.currentStock/i.initialStock)<0.2;}
function isExpI(i){return i.expiryDate&&isExpD(i.expiryDate);}
function isWarnI(i){return i.expiryDate&&isWarnD(i.expiryDate);}
function processExp(){let c=false;DB.ingredients=DB.ingredients.map(i=>{if(isExpI(i)&&i.currentStock>0){c=true;return{...i,currentStock:0};}return i;});if(c)save();}

// recipe utils
function potCost(r){return r.ingredients.reduce((s,ri)=>{const i=DB.ingredients.find(x=>x.id===ri.ingredientId);return s+(i?up(i)*ri.amountPerPot:0);},0);}
function srvCost(r){return r.servingsPerPot?potCost(r)/r.servingsPerPot:0;}

// sales utils
function rent(r){return r.rentType==='fixed'?r.rentAmount:r.totalSales*(r.rentAmount/100);}
function netP(r){
  const entries=r.recipeEntries||(r.recipeIds||[]).map(id=>({id,servings:r.servingsSold||0}));
  const cost=entries.reduce((s,e)=>{const rec=DB.recipes.find(x=>x.id===e.id);return s+(rec?srvCost(rec)*Number(e.servings||0):0);},0);
  return r.totalSales-cost-rent(r)-r.otherExpenses;
}
function mSummary(ym){
  const rs=DB.sales.filter(r=>r.date.startsWith(ym));
  let ts=0,tc=0,tr=0,to=0,sv=0;
  rs.forEach(r=>{ts+=r.totalSales;sv+=r.servingsSold;const entries=r.recipeEntries||(r.recipeIds||[]).map(id=>({id,servings:r.servingsSold||0}));const cost=entries.reduce((s,e)=>{const rec=DB.recipes.find(x=>x.id===e.id);return s+(rec?srvCost(rec)*Number(e.servings||0):0);},0);tc+=cost;tr+=rent(r);to+=r.otherExpenses;});
  return{ts,tc,tr,to,net:ts-tc-tr-to,cr:ts>0?(tc/ts)*100:0,sv,n:rs.length};
}

// alerts
function getAlerts(){return DB.ingredients.filter(i=>isLow(i)||isWarnI(i));}
function badge(){
  const n=getAlerts().length;
  const ha=document.getElementById('halert'),nb=document.getElementById('nbdg'),ac=document.getElementById('acnt');
  if(n>0){ha.classList.add('on');ac.textContent=n;nb.textContent=n>9?'9+':n;nb.classList.add('on');}
  else{ha.classList.remove('on');nb.classList.remove('on');}
}

// format
function f(n){return Math.round(n).toLocaleString('ja-JP');}
function ff(n,d=1){return parseFloat(n.toFixed(d)).toLocaleString('ja-JP');}

// toast
let tt;
function toast(msg,t='s'){
  const ic={s:'✓',w:'⚠',e:'✕'};const cl={s:'ts',w:'tw',e:'te'};
  document.getElementById('tc').innerHTML=`<div class="toast ${cl[t]}"><span>${ic[t]}</span><span>${msg}</span></div>`;
  clearTimeout(tt);tt=setTimeout(()=>{document.getElementById('tc').innerHTML='';},3500);
}

let cur='dashboard';
function go(tab){
  if(cur===tab)return;cur=tab;window._curTab=tab;
  document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(b=>{

function showSaleDetail(id){

  const recRows=entries.map(e=>{const rec=DB.recipes.find(x=>x.id===e.id);return`<div class="prow"><span class="plbl">${rec?rec.name:'不明'}</span><span class="pval">${e.servings||0}食</span></div>`;}).join('');
  const rentAmt=r.rentType==='fixed'?r.rentAmount:Math.round(r.totalSales*(r.rentAmount/100));
  const cost=netP(r)-(r.totalSales-r.otherExpenses-rentAmt-(r.totalSales-netP(r)-r.otherExpenses-rentAmt));
  const totalCost=r.totalSales-netP(r)-r.otherExpenses-rentAmt;
  const html=`<div style="position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9000;display:flex;align-items:flex-end;justify-content:center" onclick="this.remove()">
    <div style="background:var(--s1);border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:480px;max-height:80vh;overflow-y:auto" onclick="event.stopPropagation()">

      <div class="prev">
        ${recRows}
        <div class="prow"><span class="plbl">総売上</span><span class="pval tgold">¥${f(r.totalSales)}</span></div>
        <div class="prow"><span class="plbl">原価合計</span><span class="pval">¥${f(totalCost)}</span></div>
        <div class="prow"><span class="plbl">家賃（${r.rentType==='fixed'?'固定':'売上%'}）</span><span class="pval">¥${f(rentAmt)}</span></div>
        ${r.otherExpenses>0?`<div class="prow"><span class="plbl">その他経費</span><span class="pval">¥${f(r.otherExpenses)}</span></div>`:''}
        <div class="prow" style="border-top:1px solid var(--b1);margin-top:8px;padding-top:10px"><span class="plbl fbold">純利益</span><span class="pval fbold" style="font-size:18px;color:${netP(r)>=0?'var(--grn)':'var(--red)'}">¥${f(netP(r))}</span></div>

        <button class="btn bor" onclick="this.closest('[style*=fixed]').remove();deleteSale('${r.id}')">削除</button>
      </div>
    </div>
  </div>`;

}

  dF={
    date:r.date,totalSales:String(r.totalSales),
    recipeEntries:(r.recipeEntries||(r.recipeIds||[]).map(rid=>({id:rid,servings:r.servingsSold||0}))).map(e=>({...e,servings:String(e.servings)})),
    rentType:r.rentType,rentAmount:String(r.rentAmount),otherExpenses:String(r.otherExpenses||0)

  // スクロールしてフォームへ
  setTimeout(()=>document.querySelector('.card.mt3')?.scrollIntoView({behavior:'smooth'}),100);
}

  DB.sales=DB.sales.filter(x=>x.id!==id);

let cSt={rid:'',pots:'',done:false,warns:[]};

function rCook(){
  if(cSt.done){rCookDone();return;}
  const r=DB.recipes.find(x=>x.id===cSt.rid);
  const pv=r&&cSt.pots?buildPv(r):[];
  const hasI=pv.some(p=>p.ins);const hasE=pv.some(p=>p.ew);
  const rbH=DB.recipes.map(rec=>`<button class="ropt${cSt.rid===rec.id?' on':''}" onclick="cSt.rid='${rec.id}';cSt.pots='';rCook()"><span>${rec.name}</span><span class="tag ${cSt.rid===rec.id?'ta':'tgr'}">${rec.servingsPerPot}食/鍋</span></button>`).join('');
  const icH=pv.map(p=>`<div class="icrow${p.ins?' danger':p.wl||p.ew?' warn':''}"><div class="fbb mb2"><div class="fb g2"><span class="fbold" style="font-size:13px">${p.nm}</span>${p.ew?`<span class="tag ta">期限${p.dl}日</span>`:''}</div>${p.ins?'<span class="fbold tred" style="font-size:12px">在庫不足!</span>':`<span class="tmut">必要: ${p.nd.toFixed(0)}g</span>`}</div><div class="fb g2" style="align-items:center"><div class="pw" style="flex:1"><div class="pb ${p.ins?'pred':p.wl?'pamb':'pgrn'}" style="width:${Math.min(100,Math.max(0,p.pct))}%"></div></div><span style="font-size:11px;font-weight:700;min-width:52px;text-align:right;color:${p.ins?'var(--red)':p.wl?'var(--amb)':'var(--t2)'}">残${p.rm.toFixed(0)}g</span></div></div>`).join('');
  document.getElementById('s-cooking').innerHTML=`<div class="shdr"><h2>🫕 今日の仕込み</h2></div><div class="sbody">
    <div class="field"><div class="stitle mb2">仕込むレシピ</div>${rbH||'<p class="tmut">レシピが登録されていません</p>'}</div>
    ${r?`<div class="field"><div class="stitle mb2">仕込み鍋数</div><div class="stepper"><button class="sbtn" onclick="cSt.pots=String(Math.max(1,(Number(cSt.pots)||0)-1));rCook()">−</button><input type="number" inputmode="decimal" placeholder="0" value="${cSt.pots}" onchange="cSt.pots=this.value;rCook()"><button class="sbtn" onclick="cSt.pots=String((Number(cSt.pots)||0)+1);rCook()">+</button></div>${cSt.pots?`<div class="tmut" style="text-align:center;margin-top:6px">= ${Number(cSt.pots)*r.servingsPerPot}食分</div>`:''}</div>
    ${pv.length>0?`<div class="stitle mb2">使用食材チェック</div>${hasE?`<div class="card cwarn mb2" style="padding:10px 12px"><div class="fb g2"><span class="tamb">⚠</span><p style="font-size:12px;color:#e8950d">期限が近い材料が含まれています。使用前に状態を確認してください。</p></div></div>`:''}<br>${icH}<button class="btn bp mt3" style="font-size:15px;padding:15px" ${hasI?'disabled':''} onclick="confCook()">🫕 仕込みを確定する</button>`:''}`:''}
  </div>`;
}

function buildPv(recipe){
  return recipe.ingredients.map(ri=>{
    const i=DB.ingredients.find(x=>x.id===ri.ingredientId);if(!i)return null;
    const nd=ri.amountPerPot*Number(cSt.pots);const rm=i.currentStock-nd;
    const pct=i.initialStock>0?(rm/i.initialStock)*100:100;
    return{nm:i.name,id:i.id,nd,rm:Math.max(0,rm),pct,ins:rm<0,wl:rm>=0&&pct<20,ew:isWarnI(i),dl:i.expiryDate?daysLeft(i.expiryDate):null};
  }).filter(Boolean);
}

function confCook(){
  const r=DB.recipes.find(x=>x.id===cSt.rid);
  if(!r||!cSt.pots){toast('レシピと鍋数を入力してください','e');return;}
  const pv=buildPv(r);if(pv.some(p=>p.ins)){toast('在庫不足の食材があります','e');return;}
  const ws=[];pv.forEach(p=>{if(p.wl)ws.push({nm:p.nm,is:'仕込み後20%未満'});if(p.ew)ws.push({nm:p.nm,is:`期限あと${p.dl}日`});});
  DB.ingredients=DB.ingredients.map(i=>{const ri=r.ingredients.find(x=>x.ingredientId===i.id);if(!ri)return i;return{...i,currentStock:Math.max(0,i.currentStock-ri.amountPerPot*Number(cSt.pots))};});
  save();cSt.done=true;cSt.warns=ws;rCook();badge();
  if(ws.length>0)toast(`仕込み完了！ ${ws.length}件の注意あり`,'w');else toast('仕込みを確定しました ✓');
}

function rCookDone(){
  const r=DB.recipes.find(x=>x.id===cSt.rid);
  document.getElementById('s-cooking').innerHTML=`<div class="cscr"><div class="ccirc">✓</div><div class="fbold tgrn" style="font-size:22px;margin-bottom:6px">仕込み完了！</div><div class="tsm">${r?.name||''} ${cSt.pots}鍋分の仕込みを確定しました</div>
  ${cSt.warns.length>0?`<div class="card cwarn mt4" style="text-align:left"><div class="stitle tamb mb2">⚠ 注意事項</div>${cSt.warns.map(w=>`<div class="fb g2 mt2"><span class="tamb" style="font-size:12px">●</span><span class="tsm"><strong>${w.nm}</strong>：${w.is}</span></div>`).join('')}</div>`:''}
  <button class="btn bs bfw mt4" onclick="cSt={rid:'',pots:'',done:false,warns:[]};rCook()">新しい仕込みを開始</button></div>`;
}

    <textarea id="memo-input" placeholder="ここにレシピのメモを貼り付けてください...&#10;&#10;例:&#10;チキンカレー&#10;鶏もも 500g&#10;玉ねぎ 200g&#10;トマト 100g&#10;クミン 5g" style="width:100%;height:140px;background:var(--s3);border:1px solid var(--b2);border-radius:var(--rs);padding:12px 14px;color:var(--t1);font-size:13px;font-family:inherit;resize:vertical;outline:none;line-height:1.6;margin-bottom:8px"></textarea>

    <label for="receipt-input" style="display:block;width:100%;padding:18px;border-radius:var(--rs);border:2px dashed var(--b2);background:var(--s3);text-align:center;cursor:pointer;margin-bottom:8px;font-size:13px;color:var(--t2)">
      <span id="receipt-label-text">📷 レシートの写真を選択 / 撮影</span>
      <input type="file" id="receipt-input" accept="image/*" capture="environment" style="display:none" onchange="onReceiptSelected(this)">
    </label>
    <div id="receipt-preview" style="display:none;margin-bottom:10px">
      <img id="receipt-img" style="width:100%;border-radius:var(--rs);max-height:200px;object-fit:cover">
    </div>
    <button class="btn bp bfw" id="receipt-btn" onclick="analyzeReceipt()" style="display:none">🤖 レシートを解析して価格を更新</button>
    <div id="receipt-result" style="margin-top:10px"></div>

    <div style="height:1px;background:var(--b1);margin:20px 0"></div>

    <div style="height:1px;background:var(--b1);margin:20px 0"></div>
    <div class="stitle mb2">データ管理</div>
    <button class="btn bs bfw" style="margin-bottom:10px" onclick="clearCacheAndReload()">🔄 キャッシュ消去して最新版に更新</button>
    <button class="btn bs bfw" style="margin-bottom:10px" onclick="exportData()">📤 データをエクスポート</button>

  </div>`;
}

function importPreset(idx){
  const p=PRESETS[idx];
  // Add ingredients (skip duplicates)
  let addedI=0;
  for(const ing of p.ings){
    if(DB.ingredients.find(i=>i.name===ing.name))continue;
    DB.ingredients.push({id:uid(),name:ing.name,currentStock:ing.amount,initialStock:ing.amount,purchasePrice:ing.price,purchaseAmount:ing.amount,createdAt:new Date().toISOString()});
    addedI++;
  }
  // Add recipe
  if(!DB.recipes.find(r=>r.name===p.label)){
    const recipeIngs=p.ings.map(ri=>{
      const ing=DB.ingredients.find(i=>i.name===ri.name);
      return ing?{ingredientId:ing.id,amountPerPot:ri.g}:null;
    }).filter(Boolean);
    DB.recipes.push({id:uid(),name:p.label,servingsPerPot:p.servings,ingredients:recipeIngs,createdAt:new Date().toISOString()});
  }
  save();rSettings();badge();
  toast(`${p.emoji} ${p.label}を追加しました！`);
}

async function clearCacheAndReload(){
  // ★localStorageのデータは消さない（Firebase同期のため保持）
  try{
    const regs=await navigator.serviceWorker.getRegistrations();
    for(const r of regs)await r.unregister();
    const keys=await caches.keys();
    for(const k of keys)await caches.delete(k);
    toast('アプリを最新版に更新します ✓');
    setTimeout(()=>location.reload(true),1200);
  }catch(e){
    setTimeout(()=>location.reload(true),800);
  }
}
function exportData(){
  const json=JSON.stringify(DB,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='kobataro-backup-'+today()+'.json';
  a.click();
  toast('エクスポートしました');
}

function resetData(){
  if(!confirm('全データを削除します。本当によいですか？'))return;
  if(!confirm('本当に削除しますか？この操作は取り消せません。'))return;
  DB={ingredients:[],recipes:[],sales:[]};
  save();go('dashboard');toast('リセットしました','w');
}

async function aiImport(){
  const memo = document.getElementById('memo-input').value.trim();
  const servings = Number(document.getElementById('memo-servings').value) || 0;
  if(!memo){ toast('メモを入力してください','e'); return; }

  const btn = document.getElementById('ai-import-btn');
  const res = document.getElementById('ai-result');
  btn.disabled = true;
  btn.textContent = '🤖 解析中...';
  res.innerHTML = '<div style="color:var(--t3);font-size:12px;padding:10px 0">AIがメモを読み取っています...</div>';

  const prompt = `以下は料理レシピのメモです。このメモから食材リストを抽出してJSON形式で返してください。

メモ:
${memo}

${servings ? `このレシピは${servings}食分です。` : 'レシピの食数も推定してください。'}

以下のJSON形式のみで返してください。説明文は不要です：
{
  "recipeName": "レシピ名",
  "servingsPerPot": 食数(数値),
  "ingredients": [
    {"name": "食材名", "amountPerPot": 使用量のg数(数値)}
  ]
}

注意:
- 食材名は日本語で
- 重量の記載がないものは省略してOK
- 調理手順の説明・メモ・感想は無視してください
- amountPerPotは必ず数値(gまたはml換算)で`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await response.json();
    const text = data.content?.map(c => c.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);

    // Preview parsed result
    res.innerHTML = `
      <div style="background:var(--s3);border:1px solid var(--b2);border-radius:var(--rs);padding:14px;margin-top:4px">
        <div class="fbold tgold" style="font-size:14px;margin-bottom:8px">📋 ${parsed.recipeName}</div>
        <div class="tmut" style="margin-bottom:10px">${parsed.servingsPerPot}食分 · ${parsed.ingredients.length}種類の食材</div>
        <div style="max-height:160px;overflow-y:auto;margin-bottom:12px">
          ${parsed.ingredients.map(i=>`<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--b1);font-size:12px"><span style="color:var(--t1)">${i.name}</span><span style="color:var(--t3)">${i.amountPerPot}g</span></div>`).join('')}
        </div>
        <button class="btn bp bfw" onclick='confirmAiImport(${JSON.stringify(JSON.stringify(parsed))})'>✓ これでインポートする</button>
      </div>`;

  } catch(e) {
    res.innerHTML = `<div style="color:#e74c3c;font-size:12px;padding:10px 0;line-height:1.6">
      解析に失敗しました。<br>
      <span style="color:var(--t3)">インターネット接続を確認するか、メモの形式を変えて試してください。</span>
    </div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = '🤖 AIで解析してインポート';
  }
}

function confirmAiImport(jsonStr){
  const parsed = JSON.parse(jsonStr);
  let addedI = 0;
  for(const ing of parsed.ingredients){
    if(DB.ingredients.find(i=>i.name===ing.name))continue;
    DB.ingredients.push({
      id:uid(), name:ing.name,
      currentStock:500, initialStock:500,
      purchasePrice:300, purchaseAmount:500,
      createdAt:new Date().toISOString()
    });
    addedI++;
  }
  if(!DB.recipes.find(r=>r.name===parsed.recipeName)){
    const recipeIngs = parsed.ingredients.map(ri=>{
      const ing = DB.ingredients.find(i=>i.name===ri.name);
      return ing ? {ingredientId:ing.id, amountPerPot:ri.amountPerPot} : null;
    }).filter(Boolean);
    DB.recipes.push({
      id:uid(), name:parsed.recipeName,
      servingsPerPot:parsed.servingsPerPot,
      ingredients:recipeIngs,
      createdAt:new Date().toISOString()
    });
  }
  save(); rSettings(); badge();
  toast(`🍛 ${parsed.recipeName}を登録しました！`);
}


// ─── RECEIPT READER ─────────────────────────────────────────
let receiptBase64 = null;
let receiptMime = 'image/jpeg';

function onReceiptSelected(input){
  const file = input.files[0];
  if(!file) return;
  receiptMime = file.type || 'image/jpeg';
  const reader = new FileReader();
  reader.onload = e => {
    receiptBase64 = e.target.result.split(',')[1];
    document.getElementById('receipt-preview').style.display = 'block';
    document.getElementById('receipt-img').src = e.target.result;
    document.getElementById('receipt-btn').style.display = 'block';
    document.getElementById('receipt-label-text').textContent = '📷 ' + file.name + ' （タップで変更）';
    document.getElementById('receipt-result').innerHTML = '';
  };
  reader.readAsDataURL(file);
}

async function analyzeReceipt(){
  if(!receiptBase64){ toast('画像を選択してください','e'); return; }

  const btn = document.getElementById('receipt-btn');
  const res = document.getElementById('receipt-result');
  btn.disabled = true;
  btn.textContent = '🤖 解析中...';
  res.innerHTML = '<div style="color:var(--t3);font-size:12px;padding:10px 0">レシートを読み取っています...</div>';

  // 登録済み食材リストをプロンプトに含める
  const ingNames = DB.ingredients.map(i => i.name).join('、');

  const prompt = `このレシートの画像を読み取ってください。

現在アプリに登録されている食材リスト：
${ingNames || '（まだ食材が登録されていません）'}

レシートに写っている商品の中から、上記の食材リストと一致しそうなものを探してください。
商品名が多少違っても意味が同じなら対応させてください（例：「鶏もも肉」→「鶏モモ骨付き」）。

以下のJSON形式のみで返してください。説明文は不要です：
{
  "items": [
    {
      "receiptName": "レシートに書かれた商品名",
      "matchedName": "アプリの食材名（一致するものがなければnull）",
      "price": 購入金額(円・数値),
      "amount": 購入量(g・数値、記載なければnull),
      "confidence": "high/medium/low"
    }
  ]
}

- priceは税込み金額を優先
- amountはg表記がなければnull
- 食材以外（袋代・割引・合計など）は除外`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1500,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: receiptMime, data: receiptBase64 } },
            { type: 'text', text: prompt }
          ]
        }]
      })
    });

    const data = await response.json();
    const text = data.content?.map(c => c.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);

    if(!parsed.items || parsed.items.length === 0){
      res.innerHTML = '<div style="color:var(--t3);font-size:12px;padding:10px 0">レシートから食材を読み取れませんでした。<br>より鮮明な写真で試してみてください。</div>';
      return;
    }

    // チェックボックス付きプレビュー
    const rows = parsed.items.map((item, idx) => {
      const matched = item.matchedName && DB.ingredients.find(i => i.name === item.matchedName);
      const confColor = item.confidence === 'high' ? 'var(--grn)' : item.confidence === 'medium' ? 'var(--amb)' : 'var(--t3)';
      return `<div style="border:1px solid var(--b1);border-radius:var(--rx);padding:10px 12px;margin-bottom:8px;background:var(--s3)">
        <div style="display:flex;align-items:flex-start;gap:10px">
          <input type="checkbox" id="ri-${idx}" ${matched ? 'checked' : ''} style="margin-top:3px;width:18px;height:18px;flex-shrink:0">
          <div style="flex:1;min-width:0">
            <div style="font-size:12px;color:var(--t3)">${item.receiptName}</div>
            ${matched
              ? `<div style="font-size:13px;font-weight:700;color:var(--t1)">→ ${item.matchedName}</div>`
              : `<div style="font-size:12px;color:var(--t3)">（未登録の食材）</div>`}
            <div style="display:flex;gap:8px;margin-top:4px;align-items:center">
              <span style="font-size:13px;font-weight:700;color:var(--gold)">¥<input type="number" inputmode="decimal" value="${item.price||''}" id="rp-${idx}" style="width:70px;display:inline;padding:2px 6px;font-size:13px;border-radius:6px;background:var(--s4);border:1px solid var(--b2);color:var(--gold);font-weight:700"></span>
              ${item.amount ? `<span style="font-size:11px;color:var(--t3)">${item.amount}g</span>` : `<span style="font-size:11px;color:var(--t3)">g: <input type="number" inputmode="decimal" id="ra-${idx}" placeholder="?" style="width:55px;display:inline;padding:2px 6px;font-size:11px;border-radius:6px;background:var(--s4);border:1px solid var(--b2);color:var(--t2)"></span>`}
              <span style="font-size:10px;color:${confColor}">● ${item.confidence}</span>
            </div>
          </div>
        </div>
      </div>`;
    }).join('');

    res.innerHTML = `
      <div style="font-size:12px;font-weight:600;color:var(--t2);margin-bottom:10px">${parsed.items.length}件を検出 — 更新する項目にチェックを入れてください</div>
      ${rows}
      <button class="btn bp bfw" onclick='applyReceiptPrices(${JSON.stringify(JSON.stringify(parsed.items))})'>✓ チェックした価格を反映する</button>`;

  } catch(e) {
    res.innerHTML = `<div style="color:#e74c3c;font-size:12px;padding:10px 0;line-height:1.6">
      解析に失敗しました。<br>
      <span style="color:var(--t3)">画像が不鮮明か、インターネット接続を確認してください。</span>
    </div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = '🤖 レシートを解析して価格を更新';
  }
}

function applyReceiptPrices(jsonStr){
  const items = JSON.parse(jsonStr);
  let updated = 0;
  items.forEach((item, idx) => {
    const cb = document.getElementById(`ri-${idx}`);
    if(!cb || !cb.checked) return;
    if(!item.matchedName) return;
    const ing = DB.ingredients.find(i => i.name === item.matchedName);
    if(!ing) return;

    const priceEl = document.getElementById(`rp-${idx}`);
    const amountEl = document.getElementById(`ra-${idx}`);
    const price = Number(priceEl?.value) || item.price;
    const amount = item.amount || Number(amountEl?.value) || ing.purchaseAmount;

    if(price > 0){
      ing.purchasePrice = price;
      if(amount > 0) ing.purchaseAmount = amount;
      updated++;
    }
  });

  if(updated === 0){ toast('更新する項目がありません','w'); return; }
  save();
  document.getElementById('receipt-result').innerHTML = `<div style="background:var(--gbg);border:1px solid var(--gb);border-radius:var(--rs);padding:12px 14px;color:var(--grn);font-weight:600;font-size:13px">✓ ${updated}件の食材価格を更新しました！<br><span style="font-size:11px;font-weight:400;color:var(--t2)">在庫・レシピ画面の原価に反映されました</span></div>`;
  toast(`${updated}件の価格を更新しました ✓`);
  receiptBase64 = null;
}


// ─── FIREBASE CONNECT ───────────────────────────────────────
async function connectFirebase(){
  const apiKey=document.getElementById('fb-apiKey')?.value.trim();
  const projectId=document.getElementById('fb-projectId')?.value.trim();
  const appId=document.getElementById('fb-appId')?.value.trim();
  const databaseURL=document.getElementById('fb-dbUrl')?.value.trim();
  const st=document.getElementById('fb-status');
  if(!apiKey||!projectId||!appId||!databaseURL){toast('4項目すべて入力してください','e');return;}
  if(st)st.textContent='接続中...';
  const cfg={apiKey,projectId,appId,databaseURL,authDomain:`${projectId}.firebaseapp.com`,storageBucket:`${projectId}.appspot.com`,messagingSenderId:''};
  const ok=await window._fbInit(cfg);
  if(ok){toast('Firebaseに接続しました ✓');rSettings();}
  else{if(st)st.innerHTML='<span style="color:var(--red)">接続失敗。API KeyとProject IDを確認してください</span>';}
}
function disconnectFirebase(){
  if(!confirm('クラウド同期を解除しますか？データはこのデバイスに残ります。'))return;
  if(window._fbUnsub){window._fbUnsub();window._fbUnsub=null;}
  window._fbDb=null;
  window._fbSave=null;
  localStorage.removeItem('fb_cfg');
  toast('同期を解除しました');
  rSettings();
}
